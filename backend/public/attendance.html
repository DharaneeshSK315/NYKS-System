<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYKS Real Face Match</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0D47A1; --bg: #f4f7f6; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; }
        
        .card { background: white; padding: 25px; border-radius: 15px; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: left; }
        .camera-container { position: relative; width: 100%; max-width: 600px; margin: 0 auto; border-radius: 15px; overflow: hidden; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: none; }
        video { width: 100%; transform: scaleX(-1); }
        .scanner-line { 
            position: absolute; top: 0; left: 0; width: 100%; height: 2px; 
            background: rgba(0, 255, 0, 0.6); box-shadow: 0 0 15px #0f0;
            animation: scan 2s infinite ease-in-out;
            z-index: 10;
        }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
        
        .result-badge { font-size: 24px; font-weight: 700; margin-top: 15px; padding: 10px; border-radius: 10px; display: none; }
        .success { background: #e8f5e9; color: #2e7d32; }
        .error { background: #ffebee; color: #c62828; }
        
        .mapping-card { 
            background: white; padding: 25px; border-radius: 16px; 
            border: 1px solid #e0e0e0; margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            transition: all 0.3s;
            text-align: left;
        }
        .mapping-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        
        .btn-verify-wide { 
            display: block; width: 100%;
            background: #0D47A1; color: white; border: none; 
            padding: 18px; border-radius: 12px; font-weight: 700; 
            cursor: pointer; font-size: 18px; margin-top: 15px;
            transition: background 0.3s;
        }
        .btn-verify-wide:hover { background: #1565C0; }
        .btn-verify-wide:disabled { background: #90A4AE; cursor: not-allowed; }

        .btn-back { padding: 12px 20px; border-radius: 8px; border: none; background: #546E7A; color: white; cursor: pointer; font-weight: 600; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="page-title" style="color: #0D47A1; margin-bottom: 20px;">Attendance Assignment</h1>

        <!-- STEP 1: Assignment Review -->
        <div id="step-1">
            <div id="mapping-list-container" style="max-height: 650px; overflow-y: auto; padding: 10px;">
                <p style="color: #666; padding: 20px; text-align: center;">Checking for assignments...</p>
            </div>
        </div>

        <!-- STEP 2: Camera View -->
        <div id="step-2" style="display: none;">
            <div class="camera-container" id="camera-box">
                <video id="video" autoplay playsinline muted></video>
                <div id="scanner" class="scanner-line"></div>
            </div>

            <div class="card">
                <p id="instruction" style="text-align:center;">Align your face and click "Verify Match"</p>
                <div id="result-badge" class="result-badge" style="text-align:center;"></div>
                <div id="percentage" style="text-align:center; font-size: 20px; font-weight: 600; color: #666; margin-top: 5px;"></div>
                <img id="capture-preview" style="display:none; width: 150px; margin: 15px auto; border-radius: 10px; border: 2px solid var(--primary);">
                <button id="verify-btn" class="btn-verify-wide" style="margin-top: 20px;">Verify Face Match</button>
            </div>
        </div>

        <button onclick="location.href='/dashboard.html'" class="btn-back">Back to Dashboard</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const instruction = document.getElementById('instruction');
        const resultBadge = document.getElementById('result-badge');
        const percentageText = document.getElementById('percentage');
        const verifyBtn = document.getElementById('verify-btn');
        const capturePreview = document.getElementById('capture-preview');
        
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) location.href = '/';

        async function loadAssignment() {
            try {
                const now = new Date();
                const today = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
                
                const res = await fetch(`/api/admin/users?t=${Date.now()}`);
                const users = await res.json();
                const me = users.find(u => String(u.id) === String(user.id));

                const container = document.getElementById('mapping-list-container');
                container.innerHTML = '';

                if (me && me.dailySchedules && Object.keys(me.dailySchedules).length > 0) {
                    Object.keys(me.dailySchedules).sort().forEach(date => {
                        const sched = me.dailySchedules[date];
                        const isToday = (date === today);

                        const card = document.createElement('div');
                        card.className = 'mapping-card';
                        if (isToday) card.style.borderLeft = '6px solid #2e7d32';
                        
                        card.innerHTML = `
                            <div class="mapping-details">
                                <p style="margin:0; font-size: 14px; color: #666;"><strong>Date:</strong> ${date} ${isToday ? '<b style="color:#2e7d32">(TODAY)</b>' : ''}</p>
                                <p style="margin:8px 0 4px 0; font-size: 18px; color: #000;"><strong>Location:</strong> ${sched.geofence.lat}, ${sched.geofence.lng}</p>
                                <p style="margin:0; font-size: 16px; color: #444;"><strong>Time:</strong> ${sched.schedule.from} to ${sched.schedule.to}</p>
                            </div>
                            <button class="btn-verify-wide" onclick="proceedToCamera()" ${!isToday ? 'disabled' : ''}>
                                ${isToday ? 'Start Face Verification' : 'Assignment Not for Today'}
                            </button>
                        `;
                        container.appendChild(card);
                    });
                } else if (me && me.geofence) {
                    const card = document.createElement('div');
                    card.className = 'mapping-card';
                    card.innerHTML = `
                        <div class="mapping-details">
                            <p style="margin:0; font-size: 14px; color: #666;"><strong>Standard Assignment (Daily)</strong></p>
                            <p style="margin:8px 0 4px 0; font-size: 18px; color: #000;"><strong>Location:</strong> ${me.geofence.lat}, ${me.geofence.lng}</p>
                            <p style="margin:0; font-size: 16px; color: #444;"><strong>Time:</strong> ${me.schedule.from} to ${me.schedule.to}</p>
                        </div>
                        <button class="btn-verify-wide" onclick="proceedToCamera()">Start Face Verification</button>
                    `;
                    container.appendChild(card);
                } else {
                    container.innerHTML = '<p style="color:red; padding:20px; text-align:center;">No duty mappings found for your profile.</p>';
                }
            } catch (err) { 
                console.error(err); 
                document.getElementById('mapping-list-container').innerHTML = '<p style="color:red; text-align:center;">Error loading assignments.</p>';
            }
        }

        async function proceedToCamera() {
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
            document.getElementById('camera-box').style.display = 'block';
            document.getElementById('page-title').innerText = "Biometric Verification";
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
                video.srcObject = stream;
            } catch (err) {
                alert("Camera access failed. Check permissions.");
            }
        }

        verifyBtn.onclick = async () => {
            if (video.videoWidth === 0) return alert("Camera not ready.");
            verifyBtn.disabled = true;
            verifyBtn.innerText = "Analyzing Face...";
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = canvas.toDataURL('image/jpeg', 0.9);
            capturePreview.src = imageData;
            capturePreview.style.display = 'block';

            let coords = { latitude: null, longitude: null };
            try {
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true });
                });
                coords = pos.coords;
            } catch (err) { console.warn("GPS failed"); }
            
            try {
                const response = await fetch('/api/face/compare', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        selfie: imageData,
                        username: user.username,
                        latitude: coords.latitude,
                        longitude: coords.longitude
                    })
                });

                const result = await response.json();
                resultBadge.style.display = 'block';
                percentageText.innerText = `Similarity Score: ${result.similarity}%`;

                if (result.match && result.attendance === "Marked") {
                    resultBadge.innerText = "Attendance Marked ✅";
                    resultBadge.className = "result-badge success";
                    instruction.innerHTML = `<p style="color:green">${result.message}</p>`;
                    setTimeout(() => location.href = '/logs.html', 3000);
                } else {
                    resultBadge.innerText = "Access Denied ❌";
                    resultBadge.className = "result-badge error";
                    instruction.innerHTML = `<p style="color:red">${result.message || "Verification Failed"}</p>`;
                    verifyBtn.disabled = false;
                    verifyBtn.innerText = "Retry Verification";
                }
            } catch (err) {
                alert("Error connecting to server");
                verifyBtn.disabled = false;
            }
        };

        loadAssignment();
    </script>
</body>
</html>
